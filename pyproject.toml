[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# E402: Module level import not at top of file (allow sys.path hacks)
ignore = ["E402"]
select = ["E", "F", "W"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
